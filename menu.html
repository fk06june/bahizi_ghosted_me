<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Menu — Bahizi Café & Restaurant">
  <title>Menu — Bahizi Café & Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #FAF7F2;
      color: #1C1C1A;
    }

    .header {
      background: white;
      border-bottom: 1px solid rgba(201, 168, 76, 0.1);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: #1C1C1A;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .cart-badge {
      background: #C9A84C;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #1C1C1A;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(201, 168, 76, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    .product-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #F5E6D3 0%, #FAF7F2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    .product-info {
      padding: 16px;
    }

    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: #1C1C1A;
      margin-bottom: 4px;
    }

    .product-description {
      font-size: 13px;
      color: #687076;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-price {
      font-size: 18px;
      font-weight: 600;
      color: #3C78C8;
    }

    .btn-add {
      background: linear-gradient(135deg, #3C78C8 0%, #2A5BA8 100%);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-add:hover {
      transform: scale(1.05);
    }

    .cart-sidebar {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: white;
      border-left: 1px solid rgba(201, 168, 76, 0.1);
      transition: right 0.3s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.1);
    }

    .cart-sidebar.open {
      right: 0;
    }

    .cart-header {
      padding: 16px;
      border-bottom: 1px solid rgba(201, 168, 76, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
    }

    .cart-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: #FAFAFA;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .cart-item-price {
      font-size: 13px;
      color: #3C78C8;
      font-weight: 600;
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      background: white;
      border: 1px solid #E5E7EB;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .cart-footer {
      padding: 16px;
      border-top: 1px solid rgba(201, 168, 76, 0.1);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 600;
    }

    .btn-checkout {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3C78C8 0%, #2A5BA8 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(60, 120, 200, 0.3);
    }

    .empty-cart {
      text-align: center;
      padding: 40px 16px;
      color: #687076;
    }

    .empty-cart-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
    }

    .overlay.show {
      display: block;
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }

      .cart-sidebar {
        width: 100%;
        right: -100%;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-title">Menu</div>
    <div class="header-actions">
      <button class="btn-icon" onclick="toggleCart()">
        <i class="ti ti-shopping-cart"></i>
        <div class="cart-badge" id="cartBadge">0</div>
      </button>
      <button class="btn-icon" onclick="logout()">
        <i class="ti ti-logout"></i>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <div class="products-grid" id="productsGrid">
      <!-- Products will be loaded here -->
    </div>
  </div>

  <!-- Cart Sidebar -->
  <div class="overlay" id="overlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <div class="cart-title">Panier</div>
      <button class="cart-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <p>Votre panier est vide</p>
      </div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cartTotal">0 FBu</span>
      </div>
      <button class="btn-checkout" onclick="checkout()">Passer la commande</button>
    </div>
  </div>

  <script>
    let cart = [];
    let products = [];

    // Load products on page load
    window.addEventListener('load', loadProducts);

    async function loadProducts() {
      try {
        const response = await fetch('/api/products');
        products = await response.json();
        renderProducts();
      } catch (error) {
        console.error('Error loading products:', error);
        // Mock products for demo
        products = [
          { id: 1, name: 'Espresso', description: 'Café riche et intense', price: 3000, emoji: '☕' },
          { id: 2, name: 'Cappuccino', description: 'Espresso avec lait mousseux', price: 4500, emoji: '🥛' },
          { id: 3, name: 'Latte', description: 'Café lisse et crémeux', price: 4000, emoji: '☕' },
          { id: 4, name: 'Croissant', description: 'Pâtisserie française', price: 2500, emoji: '🥐' },
          { id: 5, name: 'Sandwich', description: 'Sandwich frais du jour', price: 5000, emoji: '🥪' },
          { id: 6, name: 'Gâteau', description: 'Délicieux gâteau maison', price: 3500, emoji: '🍰' },
        ];
        renderProducts();
      }
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(product => `
        <div class="product-card">
          <div class="product-image">${product.emoji || '☕'}</div>
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-description">${product.description}</div>
            <div class="product-footer">
              <div class="product-price">${product.price.toLocaleString()} FBu</div>
              <button class="btn-add" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">
                Ajouter
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id, name, price) {
      const existingItem = cart.find(item => item.id === id);
      if (existingItem) {
        existingItem.quantity++;
      } else {
        cart.push({ id, name, price, quantity: 1 });
      }
      updateCart();
    }

    function updateCart() {
      updateCartBadge();
      updateCartSidebar();
    }

    function updateCartBadge() {
      const total = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cartBadge').textContent = total;
    }

    function updateCartSidebar() {
      const cartItems = document.getElementById('cartItems');
      const cartTotal = document.getElementById('cartTotal');

      if (cart.length === 0) {
        cartItems.innerHTML = `
          <div class="empty-cart">
            <div class="empty-cart-icon">🛒</div>
            <p>Votre panier est vide</p>
          </div>
        `;
        cartTotal.textContent = '0 FBu';
        return;
      }

      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      cartItems.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${(item.price * item.quantity).toLocaleString()} FBu</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
          </div>
        </div>
      `).join('');
      cartTotal.textContent = total.toLocaleString() + ' FBu';
    }

    function updateQty(id, change) {
      const item = cart.find(item => item.id === id);
      if (item) {
        item.quantity += change;
        if (item.quantity <= 0) {
          cart = cart.filter(item => item.id !== id);
        }
        updateCart();
      }
    }

    function toggleCart() {
      document.getElementById('cartSidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    async function checkout() {
      if (cart.length === 0) {
        alert('Votre panier est vide');
        return;
      }

      const token = localStorage.getItem('authToken');
      const userId = localStorage.getItem('userId');

      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      try {
        const response = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            items: cart,
            delivery_address: 'Rohero 1, Bujumbura',
            notes: 'Commande depuis le site'
          })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Commande passée avec succès ! Un email de confirmation a été envoyé.');
          cart = [];
          updateCart();
          toggleCart();
        } else {
          alert('Erreur: ' + (data.error || 'Impossible de passer la commande'));
        }
      } catch (error) {
        alert('Erreur de connexion. Veuillez réessayer.');
        console.error('Checkout error:', error);
      }
    }

    function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('userId');
      localStorage.removeItem('userName');
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
